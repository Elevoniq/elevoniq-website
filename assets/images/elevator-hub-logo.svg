<?xml version="1.0" encoding="utf-8"?>
<!-- ELEVATOR HUB® Logo — ElevonIQ – Visuelle Kommunikation -->
<!-- Light-Version (heller Hintergrund) -->
<!--
  Geometrisches Symbol identisch mit ElevonIQ-Original, skaliert auf 130 px Höhe
  Skalierungsformel: x_new = (x_orig - 409.5) * 0.41358 + 20
                     y_new = (y_orig - 741.2) * 0.41358 + 20
  viewBox-Breite: Symbol(~122px) + gap(30px) + text(~590px) + rechts-Rand(20px) = 762
  viewBox-Höhe:  oben(20px) + Symbol(130px) + claim(25px) + unten(15px) = 190
-->
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 762 190" xml:space="preserve">
  <defs>
    <style>
      text { font-family: 'Work Sans', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Geometrisches Symbol -->
  <polygon fill="#69B0AB" points="20.0,97.1 49.4,97.1 34.7,74.9"/>
  <rect    fill="#69B0AB" x="68.4" y="20" width="4.8" height="130" rx="2.4"/>
  <polygon fill="#69B0AB" points="106.9,95.1 121.6,72.9 92.2,72.9"/>

  <!-- Produktname -->
  <text x="152" y="98" font-size="52" font-weight="700" fill="#1E2761">ELEVATOR HUB<tspan dy="-22" font-size="26">®</tspan></text>

  <!-- Claim -->
  <text x="152" y="172" font-size="13" font-weight="400" fill="#69B0AB">Alle Aufzüge. Alle Dokumente. Auf einen Blick.</text>
</svg>
