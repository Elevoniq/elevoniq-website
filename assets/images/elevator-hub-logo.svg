<?xml version="1.0" encoding="utf-8"?>
<!-- ELEVATOR HUB® Logo — ElevonIQ – Visuelle Kommunikation -->
<!-- Geometrisches Symbol identisch mit ElevonIQ-Original, skaliert auf 130 px Höhe -->
<!--
  Skalierungsgrundlage (ElevonIQ-Original-SVG, viewBox 370 710 1650 380):
    Symbol-Bereich: x=409–655, y=741–1055  →  246 px breit, 314 px hoch
    Zielhöhe: 130 px  →  Faktor f=130/314 ≈ 0.4140
    Formel: x_neu = (x_orig – 409) * f + 20
            y_neu = (y_orig – 741) * f + 20
    Abstand Symbol → Text: 30 px
    viewBox-Breite: Symbol(~122px) + gap(30px) + text(~590px) + rechts-Rand(20px) = 762
    viewBox-Höhe:  oben(20px) + Symbol(130px) + claim(25px) + unten(15px) = 190
-->
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 762 190" xml:space="preserve">
  <defs>
    <style>
      .sym  { fill: #69B0AB; }
      .navy { fill: #1E2761; }
      .teal { fill: #69B0AB; }
    </style>
  </defs>

  <!-- =============================================
       TEAL-SYMBOL (abstrahierter Aufzug)
       Dreieck links: Original 409.5,927.4 / 480.5,927.4 / 445,873.9
       → x: 0.2, 29.3, 14.7   y: 97.0, 97.0, 74.9
  ============================================= -->
  <polygon class="sym"
    points="20.2,117.0 49.3,117.0 34.7,94.9"/>

  <!-- Vertikale Linie: Original x≈526–538, y=741–1055
       x_center=(532−409)*0.414+20 = 70.9 → half-width=2.4
       y_top=20, y_bottom=(1055−741)*0.414+20 = 150.0
  -->
  <rect class="sym" x="68.5" y="20" width="4.8" height="130" rx="2.4" ry="2.4"/>

  <!-- Dreieck rechts: Original 619.6,922.8 / 655.1,869.2 / 584.1,869.2
       x: (619.6−409)*0.414+20=107.2 | (655.1−409)*0.414+20=121.9 | (584.1−409)*0.414+20=92.5
       y: (922.8−741)*0.414+20=95.2  | (869.2−741)*0.414+20=72.9  | (869.2−741)*0.414+20=72.9
  -->
  <polygon class="sym"
    points="107.2,95.2 121.9,72.9 92.5,72.9"/>

  <!-- =============================================
       HAUPTTEXT: ELEVATOR HUB
       Baseline-Mitte des Symbols ≈ y=95 (Dreieck-Mitte ca. 85, linie bis 150)
       Schriftgröße 72pt → cap-height ≈ 52 px → Baseline bei ca. 20+52=72
       Optisch zentriert zum Symbol: baseline y=110
  ============================================= -->
  <!-- ELEVATOR — dünn (300) -->
  <text
    x="152"
    y="110"
    font-family="'Work Sans', Arial, Helvetica, sans-serif"
    font-weight="300"
    font-size="72"
    letter-spacing="1"
    class="navy">ELEVATOR </text>

  <!-- HUB — fett (800) -->
  <text
    x="560"
    y="110"
    font-family="'Work Sans', Arial, Helvetica, sans-serif"
    font-weight="800"
    font-size="72"
    letter-spacing="1"
    class="navy">HUB</text>

  <!-- ® hochgestellt -->
  <text
    x="743"
    y="72"
    font-family="'Work Sans', Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="24"
    class="navy">&#174;</text>

  <!-- =============================================
       CLAIM-ZEILE
       Unterhalb des Haupttexts, Teal, linksbündig mit Text
  ============================================= -->
  <text
    x="152"
    y="143"
    font-family="'Work Sans', Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="17"
    letter-spacing="3.5"
    class="teal">AUFZUGSMANAGEMENT &#183; DIGITAL</text>

</svg>
